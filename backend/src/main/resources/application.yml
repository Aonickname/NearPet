server:
  port: ${BACKEND_SERVER_PORT:8080}

spring:
  application:
    name: nearpet-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/nearpet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}

app:
  public-base-url: ${BACKEND_PUBLIC_BASE_URL:http://localhost:8080}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  frontend-base-url-patterns: ${FRONTEND_BASE_URLS:${FRONTEND_BASE_URL:http://localhost:3000}}
  mail:
    from: ${MAIL_FROM:}
  storage:
    reservations-file: data/reservations.json
    photos-file: data/photos.json
    upload-dir: data/uploads
    admin-settings-file: data/admin-settings.json
